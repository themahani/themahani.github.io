services:
  jekyll:
    image: jekyll-site:latest
    build:
      context: .
    volumes:
      - .:/usr/src/app
      - /usr/src/app/_site
      - bundle_cache:/usr/local/bundle
    ports:
      - "4000:4000"
    command: >
      bash -c "git config --global --add safe.directory /usr/src/app &&
      bundle install &&
      bundle exec jekyll serve --host 0.0.0.0 --watch"
    stdin_open: true
    tty: true

volumes:
  bundle_cache:
